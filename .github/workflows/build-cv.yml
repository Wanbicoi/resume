name: Build CV

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Render CV
        run: |
          python -m rendercv render ./Hoang_The_Trung_CV.yaml

      - name: Verify expected outputs
        run: |
          test -f rendercv_output/Hoang_The_Trung_CV.pdf

      - name: Upload CV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cv-output
          path: |
            rendercv_output/*.pdf
            rendercv_output/*.html
            rendercv_output/*.md
            rendercv_output/*.typ
            rendercv_output/*.png
          if-no-files-found: error
